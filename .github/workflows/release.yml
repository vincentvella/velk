name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            artifact: velk-darwin-arm64
          - target: x86_64-macos
            artifact: velk-darwin-x64
          - target: aarch64-linux
            artifact: velk-linux-arm64
          - target: x86_64-linux
            artifact: velk-linux-x64
    steps:
      - uses: actions/checkout@v5

      - name: install zig 0.16.0
        run: |
          curl -sSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz -o zig.tar.xz
          mkdir -p $HOME/zig
          tar -xJf zig.tar.xz -C $HOME/zig --strip-components=1
          echo "$HOME/zig" >> $GITHUB_PATH

      - name: build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --prefix zig-out

      - name: package
        run: |
          mkdir -p dist
          cp zig-out/bin/velk dist/velk
          cp LICENSE dist/LICENSE
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist velk LICENSE
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
