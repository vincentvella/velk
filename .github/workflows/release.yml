name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            artifact: velk-darwin-arm64
          - target: x86_64-macos
            artifact: velk-darwin-x64
          - target: aarch64-linux
            artifact: velk-linux-arm64
          - target: x86_64-linux
            artifact: velk-linux-x64
          # Statically linked linux-musl builds for distro-agnostic
          # distribution (Alpine, scratch containers, anywhere a
          # glibc dep would bite).
          - target: aarch64-linux-musl
            artifact: velk-linux-arm64-musl
          - target: x86_64-linux-musl
            artifact: velk-linux-x64-musl
    steps:
      - uses: actions/checkout@v6

      - name: install zig 0.16.0
        run: |
          curl -sSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz -o zig.tar.xz
          mkdir -p $HOME/zig
          tar -xJf zig.tar.xz -C $HOME/zig --strip-components=1
          echo "$HOME/zig" >> $GITHUB_PATH

      - name: build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --prefix zig-out

      - name: package
        run: |
          mkdir -p dist
          cp zig-out/bin/velk dist/velk
          cp LICENSE dist/LICENSE
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist velk LICENSE
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      # Skip cleanly when the tap PAT isn't configured (e.g. in forks).
      # This lets the rest of the release pipeline succeed even if the
      # maintainer hasn't set up tap publishing yet.
      - name: check for tap token
        id: gate
        run: |
          if [[ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping tap bump"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: derive version
        if: steps.gate.outputs.skip != 'true'
        id: ver
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: download release sha256s
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p sums
          tag="${{ steps.ver.outputs.tag }}"
          base="https://github.com/${{ github.repository }}/releases/download/$tag"
          for art in velk-darwin-arm64 velk-darwin-x64 velk-linux-arm64 velk-linux-x64; do
            curl -fsSL "$base/$art.tar.gz.sha256" -o "sums/$art.sha256"
          done

      - name: rewrite formula
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"

          # `shasum -a 256 <file>` writes "<hash>  <file>" — first field is the hash.
          hash_for() { awk '{print $1}' "sums/$1.sha256"; }
          DA=$(hash_for velk-darwin-arm64)
          DX=$(hash_for velk-darwin-x64)
          LA=$(hash_for velk-linux-arm64)
          LX=$(hash_for velk-linux-x64)

          cat > brew/velk.rb <<RUBY
          class Velk < Formula
            desc "Zig 0.16 terminal AI harness — Anthropic + OpenAI, MCP, vim mode, OSC-52 clipboard"
            homepage "https://github.com/${{ github.repository }}"
            version "$version"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/${{ github.repository }}/releases/download/v#{version}/velk-darwin-arm64.tar.gz"
                sha256 "$DA"
              end
              on_intel do
                url "https://github.com/${{ github.repository }}/releases/download/v#{version}/velk-darwin-x64.tar.gz"
                sha256 "$DX"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${{ github.repository }}/releases/download/v#{version}/velk-linux-arm64.tar.gz"
                sha256 "$LA"
              end
              on_intel do
                url "https://github.com/${{ github.repository }}/releases/download/v#{version}/velk-linux-x64.tar.gz"
                sha256 "$LX"
              end
            end

            def install
              bin.install "velk"
            end

            test do
              assert_match "velk #{version}", shell_output("#{bin}/velk --version")
            end
          end
          RUBY

      - name: clone tap, copy formula, push
        if: steps.gate.outputs.skip != 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Owner/repo of the tap. Override via repo variable
          # HOMEBREW_TAP_REPO if you fork or rename it.
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'vincentvella/homebrew-velk' }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:$TAP_TOKEN@github.com/$TAP_REPO.git" tap
          mkdir -p tap/Formula
          cp brew/velk.rb tap/Formula/velk.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first so the up-to-date check works on a brand-new
          # file too — `git diff --quiet` on an unstaged path treats
          # untracked files as "no diff" and would silently skip.
          git add Formula/velk.rb
          if git diff --cached --quiet -- Formula/velk.rb; then
            echo "tap already up to date for $VERSION — nothing to push"
            exit 0
          fi

          git commit -m "velk $VERSION"
          git push origin HEAD:main

  vscode-marketplace:
    name: publish VS Code extension
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      # Skip cleanly if the token isn't configured — same pattern as
      # the homebrew job. This keeps the rest of the release pipeline
      # green while a maintainer sets up Marketplace publishing.
      - name: check for marketplace token
        id: gate
        run: |
          if [[ -z "${{ secrets.VSCODE_MARKETPLACE_TOKEN }}" ]]; then
            echo "VSCODE_MARKETPLACE_TOKEN secret not set — skipping VS Code publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: derive version
        if: steps.gate.outputs.skip != 'true'
        id: ver
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: setup Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: bump version + install + build
        if: steps.gate.outputs.skip != 'true'
        working-directory: vscode
        run: |
          set -euo pipefail
          # Sync package.json's version to the release tag so the
          # Marketplace lists the right number. `npm version` rejects
          # an unchanged version, so guard.
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "${{ steps.ver.outputs.version }}" ]; then
            npm version --no-git-tag-version "${{ steps.ver.outputs.version }}"
          fi
          npm ci
          npm run compile

      - name: publish to VS Code Marketplace
        if: steps.gate.outputs.skip != 'true'
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
        run: |
          # `vsce publish` builds + uploads in one shot. --no-dependencies
          # because we have no runtime deps; only @types are devDeps and
          # vsce sometimes flags those without --skip-license / --no-deps.
          npx --yes @vscode/vsce@latest publish --no-dependencies --pat "$VSCE_PAT"

  jetbrains-marketplace:
    name: publish JetBrains plugin
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: check for marketplace token
        id: gate
        run: |
          if [[ -z "${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}" ]]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN secret not set — skipping JetBrains publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: derive version
        if: steps.gate.outputs.skip != 'true'
        id: ver
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: setup JDK 17
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: setup Gradle
        if: steps.gate.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: bump plugin version
        if: steps.gate.outputs.skip != 'true'
        working-directory: jetbrains
        run: |
          # Reflect the release tag in build.gradle.kts so the
          # plugin .zip name + Marketplace listing stay in sync.
          sed -i 's/^version = ".*"/version = "${{ steps.ver.outputs.version }}"/' build.gradle.kts

      - name: publish to JetBrains Marketplace
        if: steps.gate.outputs.skip != 'true'
        working-directory: jetbrains
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          # Optional: override the release channel ("default", "eap",
          # "beta"). Default channel = stable Marketplace listing.
          PUBLISH_CHANNEL: ${{ vars.JETBRAINS_PUBLISH_CHANNEL || 'default' }}
        run: |
          gradle publishPlugin \
            -Pintellij.publish.token="$PUBLISH_TOKEN" \
            -Pintellij.publish.channel="$PUBLISH_CHANNEL"
